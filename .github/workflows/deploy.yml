name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm@10

      - name: Patch package.json for standalone CI build
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.name = 'censor-coin-tma';
            const replitPkgs = [
              '@replit/vite-plugin-cartographer',
              '@replit/vite-plugin-dev-banner',
              '@replit/vite-plugin-runtime-error-modal'
            ];
            replitPkgs.forEach(p => delete pkg.devDependencies[p]);
            delete pkg.dependencies['@workspace/api-client-react'];
            delete pkg.devDependencies['@workspace/api-client-react'];
            Object.keys(pkg.devDependencies || {}).forEach(k => {
              if (pkg.devDependencies[k] === 'catalog:') {
                delete pkg.devDependencies[k];
              }
            });
            Object.keys(pkg.dependencies || {}).forEach(k => {
              if (pkg.dependencies[k] === 'catalog:') {
                delete pkg.dependencies[k];
              }
            });
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
            console.log('Patched package.json');
          "

      - name: Patch tsconfig.json for standalone CI build
        run: |
          node -e "
            const fs = require('fs');
            const tsconfig = {
              compilerOptions: {
                target: 'es2022',
                lib: ['es2022', 'esnext', 'dom', 'dom.iterable'],
                module: 'esnext',
                moduleResolution: 'bundler',
                isolatedModules: true,
                jsx: 'preserve',
                strict: true,
                noImplicitAny: true,
                noImplicitThis: true,
                strictNullChecks: true,
                strictFunctionTypes: false,
                strictBindCallApply: true,
                strictPropertyInitialization: true,
                useUnknownInCatchVariables: true,
                alwaysStrict: true,
                noImplicitOverride: false,
                noImplicitReturns: true,
                noFallthroughCasesInSwitch: true,
                noUnusedLocals: false,
                noEmit: true,
                noEmitOnError: true,
                resolveJsonModule: true,
                allowImportingTsExtensions: true,
                skipLibCheck: true,
                types: ['node', 'vite/client'],
                paths: { '@/*': ['./src/*'] }
              },
              include: ['src/**/*'],
              exclude: ['node_modules', 'build', 'dist', '**/*.test.ts']
            };
            fs.writeFileSync('tsconfig.json', JSON.stringify(tsconfig, null, 2));
            console.log('Patched tsconfig.json');
          "

      - name: Patch vite.config.ts for standalone CI build
        run: |
          cat > vite.config.ts << 'EOF'
          import { defineConfig } from "vite";
          import react from "@vitejs/plugin-react";
          import tailwindcss from "@tailwindcss/vite";
          import path from "path";

          const rawPort = process.env.PORT;
          const port = rawPort ? Number(rawPort) : 3000;
          const basePath = process.env.BASE_PATH ?? "/censor-coin-tma/";

          export default defineConfig({
            base: basePath,
            plugins: [react(), tailwindcss()],
            resolve: {
              alias: { "@": path.resolve(import.meta.dirname, "src") },
              dedupe: ["react", "react-dom"],
            },
            root: path.resolve(import.meta.dirname),
            build: {
              outDir: path.resolve(import.meta.dirname, "dist/public"),
              emptyOutDir: true,
            },
            server: { port, host: "0.0.0.0", allowedHosts: true },
            preview: { port, host: "0.0.0.0", allowedHosts: true },
          });
          EOF

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build
        run: pnpm run build
        env:
          NODE_ENV: production
          BASE_PATH: /censor-coin-tma/
          VITE_MONETAG_ZONE_ID: 10883491
          VITE_ONCLICKA_SPOT_ID: 6116695

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist/public
